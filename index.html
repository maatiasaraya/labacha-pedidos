<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>La Bacha</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d14;
      --surface:   #13131e;
      --card:      #1b1b28;
      --card2:     #22223a;
      --border:    #28283c;
      --pink:      #f0116a;
      --pink-dim:  rgba(240,17,106,.13);
      --teal:      #00c9a7;
      --teal-dim:  rgba(0,201,167,.13);
      --text:      #eeeef5;
      --muted:     #55558a;
      --danger:    #ff4060;
      --warn:      #ffab40;
      --radius:    16px;
      --tab-h:     66px;
      --hdr-h:     58px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--hdr-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px; z-index: 100;
    }
    .logo strong {
      display: block;
      font-size: 20px; font-weight: 900; letter-spacing: -.3px;
      background: linear-gradient(90deg, var(--pink) 0%, #ff8fc8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo span { font-size: 11px; color: var(--muted); font-weight: 500; }
    .btn-refresh {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--card); border: 1px solid var(--border);
      color: var(--muted); font-size: 19px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: color .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-refresh:active { color: var(--pink); border-color: var(--pink); }

    /* ── MAIN ── */
    .main {
      position: fixed;
      top: var(--hdr-h); bottom: var(--tab-h);
      left: 0; right: 0;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .tab-panel { display: none; padding: 14px 14px 28px; }
    .tab-panel.active { display: block; }

    /* ── TABBAR ── */
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--tab-h);
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; z-index: 100;
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      border: none; background: none;
      color: var(--muted); font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .5px;
      cursor: pointer; position: relative;
      -webkit-tap-highlight-color: transparent;
      transition: color .15s;
    }
    .tab-btn .ico { font-size: 22px; line-height: 1; }
    .tab-btn.active { color: var(--pink); }
    .tab-btn.active::after {
      content: '';
      position: absolute; top: 0; left: 28%; right: 28%;
      height: 2px; background: var(--pink);
      border-radius: 0 0 4px 4px;
    }
    .tab-badge {
      position: absolute; top: 7px; right: calc(50% - 24px);
      background: var(--pink); color: #fff;
      border-radius: 50%; width: 17px; height: 17px;
      font-size: 10px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── LOADER / EMPTY ── */
    .loader {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 72px 20px; gap: 14px;
      color: var(--muted); font-size: 14px; font-weight: 600;
    }
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid var(--border); border-top-color: var(--pink);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty {
      text-align: center; padding: 72px 20px; color: var(--muted);
    }
    .empty .ico { font-size: 54px; margin-bottom: 12px; }
    .empty p { font-size: 17px; font-weight: 800; }
    .empty small { font-size: 13px; margin-top: 4px; display: block; }

    /* ── SEC LABEL ── */
    .sec-label {
      font-size: 11px; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: .8px;
      margin-bottom: 10px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(var(--tab-h) + 14px); left: 14px; right: 14px;
      background: var(--card2); color: var(--text);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 13px 18px; font-size: 14px; font-weight: 700;
      text-align: center; z-index: 300;
      opacity: 0; transform: translateY(8px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok  { background: var(--teal); color: #001a14; border-color: var(--teal); }
    .toast.err { background: var(--danger); color: #fff; border-color: var(--danger); }

    /* ══════════════════════════════════════
       PEDIDOS
    ═══════════════════════════════════════ */
    .cliente-group { margin-bottom: 14px; }

    .cliente-hdr {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .cliente-nombre { flex: 1; font-size: 17px; font-weight: 900; }
    .cliente-pill {
      font-size: 11px; font-weight: 800; color: var(--pink);
      background: var(--pink-dim); border-radius: 20px; padding: 3px 10px;
    }
    .pedido-fecha-row {
      background: var(--surface);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      padding: 6px 16px;
      font-size: 11px; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: .6px;
    }
    .pedido-row {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-top: none;
    }
    .pedido-row:last-child { border-radius: 0 0 var(--radius) var(--radius); }
    .pedido-info { flex: 1; min-width: 0; }
    .pedido-sabor { font-size: 16px; font-weight: 700; }
    .pedido-meta {
      margin-top: 3px; display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--muted);
    }
    .fecha-badge {
      font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 6px;
    }
    .fecha-badge.ok      { background: var(--teal-dim); color: var(--teal); }
    .fecha-badge.urgente { background: rgba(255,171,64,.15); color: var(--warn); }
    .fecha-badge.vencido { background: rgba(255,64,96,.15); color: var(--danger); }

    .row-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-icon {
      width: 42px; height: 42px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--card2);
      color: var(--muted); font-size: 17px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; -webkit-tap-highlight-color: transparent;
    }
    .btn-icon:active { transform: scale(.93); }
    .btn-icon.del:active { background: rgba(255,64,96,.2); color: var(--danger); border-color: var(--danger); }
    .btn-icon.chk:active { background: var(--teal-dim); color: var(--teal); border-color: var(--teal); }
    .btn-icon:disabled { opacity: .35; pointer-events: none; }

    /* ══════════════════════════════════════
       FORMULARIO — NUEVO
    ═══════════════════════════════════════ */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block; font-size: 11px; font-weight: 800;
      color: var(--muted); text-transform: uppercase; letter-spacing: .6px;
      margin-bottom: 7px;
    }
    input[type="text"],
    input[type="number"],
    input[type="date"] {
      width: 100%;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      font-size: 16px; color: var(--text); font-family: inherit;
      outline: none; transition: border-color .2s;
      -webkit-appearance: none; color-scheme: dark;
    }
    input:focus { border-color: var(--pink); }
    input::placeholder { color: var(--muted); }
    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .sabor-row { display: flex; gap: 8px; align-items: stretch; }
    .sabor-row .inp-sabor { flex: 3; }
    .sabor-row .inp-cant  { flex: 1.2; min-width: 0; }
    .btn-plus {
      width: 52px; flex-shrink: 0;
      background: var(--pink); color: #fff;
      border: none; border-radius: 12px;
      font-size: 28px; font-weight: 300; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity .15s; -webkit-tap-highlight-color: transparent;
    }
    .btn-plus:active { opacity: .75; }

    .lineas-box {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; overflow: hidden; margin-bottom: 16px;
    }
    .linea-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border-bottom: 1px solid var(--border);
    }
    .linea-item:last-child { border-bottom: none; }
    .linea-sabor { flex: 1; font-size: 15px; font-weight: 600; }
    .linea-cant  { font-size: 15px; font-weight: 900; color: var(--pink); }
    .linea-unit  { font-size: 11px; color: var(--muted); font-weight: 600; }
    .btn-del-linea {
      background: none; border: none; color: var(--muted);
      font-size: 24px; line-height: 1; cursor: pointer; padding: 0 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-del-linea:active { color: var(--danger); }

    .btn-submit {
      width: 100%; background: var(--pink); color: #fff;
      border: none; border-radius: 14px; padding: 16px;
      font-size: 16px; font-weight: 900; letter-spacing: .2px;
      cursor: pointer; transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-submit:active  { opacity: .85; transform: scale(.98); }
    .btn-submit:disabled { opacity: .4; pointer-events: none; }

    /* ══════════════════════════════════════
       INVENTARIO
    ═══════════════════════════════════════ */
    .inv-list { display: flex; flex-direction: column; }
    .inv-row {
      display: flex; align-items: center; gap: 12px;
      padding: 15px 16px;
      background: var(--card); border: 1px solid var(--border); border-top: none;
    }
    .inv-list .inv-row:first-child { border-top: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; }
    .inv-list .inv-row:last-child  { border-radius: 0 0 var(--radius) var(--radius); }
    .inv-list .inv-row:only-child  { border-top: 1px solid var(--border); border-radius: var(--radius); }
    .inv-sabor-wrap { flex: 1; min-width: 0; }
    .inv-sabor-name { font-size: 15px; font-weight: 700; }
    .inv-updated    { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .inv-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .inv-cant {
      font-size: 20px; font-weight: 900; color: var(--pink);
      min-width: 36px; text-align: right; cursor: pointer;
      border-radius: 6px; padding: 2px 4px;
      transition: background .15s;
    }
    .inv-cant:active { background: var(--pink-dim); }
    .inv-unit { font-size: 12px; color: var(--muted); font-weight: 600; }
    .inv-edit-input {
      width: 72px; padding: 6px 10px;
      background: var(--surface); border: 1.5px solid var(--pink);
      border-radius: 8px; font-size: 20px; font-weight: 900;
      color: var(--pink); text-align: right; font-family: inherit;
      outline: none; -webkit-appearance: none; -moz-appearance: textfield;
      color-scheme: dark;
    }
    .inv-edit-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <strong>🍦 La Bacha</strong>
    <span>Gestión de pedidos</span>
  </div>
  <button class="btn-refresh" id="btnRefresh" aria-label="Actualizar">↻</button>
</header>

<!-- MAIN -->
<main class="main">

  <!-- PEDIDOS -->
  <div id="panel-pedidos" class="tab-panel active">
    <div id="pedidos-content">
      <div class="loader"><div class="spinner"></div>Cargando pedidos…</div>
    </div>
  </div>

  <!-- NUEVO -->
  <div id="panel-nuevo" class="tab-panel">
    <div class="card">
      <form id="formPedido" novalidate>

        <div class="form-group">
          <label for="fCliente">Cliente</label>
          <input id="fCliente" type="text" placeholder="Nombre del cliente" autocomplete="off" />
        </div>

        <div class="form-group">
          <label>Sabores</label>
          <div class="sabor-row">
            <input id="fSabor" type="text"   placeholder="Sabor"  class="inp-sabor" autocomplete="off" />
            <input id="fCant"  type="number" placeholder="Und"    class="inp-cant" min="1" step="1" />
            <button type="button" class="btn-plus" id="btnAdd">+</button>
          </div>
        </div>

        <div id="lineasWrap" style="display:none">
          <div class="lineas-box" id="lineasBox"></div>
        </div>

        <div class="form-group">
          <label for="fFecha">Fecha de entrega</label>
          <input id="fFecha" type="date" />
        </div>

        <button type="submit" class="btn-submit" id="btnGuardar">Guardar pedido</button>
      </form>
    </div>
  </div>

  <!-- INVENTARIO -->
  <div id="panel-inventario" class="tab-panel">
    <div id="inv-content">
      <div class="loader"><div class="spinner"></div>Cargando inventario…</div>
    </div>
  </div>

</main>

<!-- TABBAR -->
<nav class="tabbar">
  <button class="tab-btn active" data-tab="pedidos">
    <span class="ico">📋</span>Pedidos
  </button>
  <button class="tab-btn" data-tab="nuevo">
    <span class="ico">✏️</span>Nuevo
  </button>
  <button class="tab-btn" data-tab="inventario">
    <span class="ico">📦</span>Inventario
  </button>
</nav>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  /* ── SUPABASE ── */
  const sb = supabase.createClient(
    'https://nwuubkgfegxdouqpxnmh.supabase.co',
    'sb_publishable_9iC-oZ5UVluTNgkTREqqCg_98cbxa3f'
  );

  /* ── TOAST ── */
  let _tt;
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + type;
    clearTimeout(_tt);
    _tt = setTimeout(() => el.classList.remove('show'), 3200);
  }

  /* ── FECHA UTILS ── */
  function hoyISO() { return new Date().toISOString().slice(0, 10); }
  function mananaISO() {
    const d = new Date(); d.setDate(d.getDate() + 1);
    return d.toISOString().slice(0, 10);
  }
  function fmtFecha(str) {
    if (!str) return '—';
    const iso = str.split('T')[0];
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }
  function fechaEstado(str) {
    if (!str) return 'ok';
    const iso = str.split('T')[0];
    const hoy = hoyISO(), man = mananaISO();
    if (iso < hoy) return 'vencido';
    if (iso === hoy || iso === man) return 'urgente';
    return 'ok';
  }
  function fechaLabel(str) {
    if (!str) return '—';
    const iso = str.split('T')[0];
    const hoy = hoyISO(), man = mananaISO();
    if (iso === hoy) return 'Hoy';
    if (iso === man) return 'Mañana';
    if (iso < hoy)  return `Venció ${fmtFecha(str)}`;
    return fmtFecha(str);
  }

  /* ── TABS ── */
  const _loaded = { pedidos: false, inventario: false };

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById('panel-' + tab).classList.add('active');
      if (tab === 'pedidos'    && !_loaded.pedidos)    loadPedidos();
      if (tab === 'inventario' && !_loaded.inventario) loadInventario();
    });
  });

  /* ════════════════════════════════════════
     PEDIDOS
  ════════════════════════════════════════ */
  async function loadPedidos(silent = false) {
    const el = document.getElementById('pedidos-content');
    if (!silent) el.innerHTML = '<div class="loader"><div class="spinner"></div>Cargando pedidos…</div>';
    _loaded.pedidos = false;

    const { data, error } = await sb
      .from('pedidos')
      .select('*')
      .eq('estado', 'pendiente')
      .order('fecha_entrega', { ascending: true })
      .order('cliente',       { ascending: true });

    if (error) {
      el.innerHTML = `<div class="empty"><div class="ico">⚠️</div><p>Error al cargar</p><small>${error.message}</small></div>`;
      return;
    }

    _loaded.pedidos = true;
    renderPedidos(el, data || []);
  }

  function renderPedidos(el, pedidos) {
    // Badge en tab
    const tabBtn = document.querySelector('[data-tab="pedidos"]');
    const old = tabBtn.querySelector('.tab-badge');
    if (old) old.remove();
    if (pedidos.length > 0) {
      const b = document.createElement('span');
      b.className = 'tab-badge';
      b.textContent = pedidos.length;
      tabBtn.appendChild(b);
    }

    if (pedidos.length === 0) {
      el.innerHTML = `<div class="empty"><div class="ico">✅</div><p>Sin pedidos pendientes</p><small>Todo al día.</small></div>`;
      return;
    }

    // Agrupar por cliente manteniendo orden por fecha
    const grupos = new Map();
    pedidos.forEach(p => {
      if (!grupos.has(p.cliente)) grupos.set(p.cliente, []);
      grupos.get(p.cliente).push(p);
    });

    el.innerHTML = '';

    grupos.forEach((items, cliente) => {
      const g = document.createElement('div');
      g.className = 'cliente-group';

      // Cabecera del cliente
      const hdr = document.createElement('div');
      hdr.className = 'cliente-hdr';
      hdr.innerHTML = `
        <span class="cliente-nombre">${cliente}</span>
        <span class="cliente-pill">${items.length} sabor${items.length !== 1 ? 'es' : ''}</span>
      `;
      g.appendChild(hdr);

      // Filas de sabores
      items.forEach(p => {
        const estado = fechaEstado(p.fecha_entrega);
        const row = document.createElement('div');
        row.className = 'pedido-row';
        row.innerHTML = `
          <div class="pedido-info">
            <div class="pedido-sabor">${p.sabor}</div>
            <div class="pedido-meta">
              <span>${p.cantidad} und</span>
              <span class="fecha-badge ${estado}">${fechaLabel(p.fecha_entrega)}</span>
            </div>
          </div>
          <div class="row-actions">
            <button class="btn-icon del" aria-label="Eliminar">🗑</button>
            <button class="btn-icon chk" aria-label="Entregar">✓</button>
          </div>
        `;
        row.querySelector('.btn-icon.del').addEventListener('click', async function () {
          this.disabled = true;
          const { error } = await sb.from('pedidos').delete().eq('id', p.id);
          if (error) { toast('Error al eliminar', 'err'); this.disabled = false; return; }
          toast('Pedido eliminado');
          _loaded.pedidos = false;
          loadPedidos(true);
        });
        row.querySelector('.btn-icon.chk').addEventListener('click', async function () {
          this.disabled = true;
          const { error } = await sb.from('pedidos').update({ estado: 'entregado' }).eq('id', p.id);
          if (error) { toast('Error al actualizar', 'err'); this.disabled = false; return; }
          toast('Marcado como entregado ✓', 'ok');
          _loaded.pedidos = false;
          loadPedidos(true);
        });
        g.appendChild(row);
      });

      el.appendChild(g);
    });
  }

  /* ════════════════════════════════════════
     NUEVO PEDIDO
  ════════════════════════════════════════ */
  document.getElementById('fFecha').value = mananaISO();

  let lineas = [];

  function renderLineas() {
    const wrap = document.getElementById('lineasWrap');
    const box  = document.getElementById('lineasBox');
    if (lineas.length === 0) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    box.innerHTML = '';
    lineas.forEach((l, i) => {
      const div = document.createElement('div');
      div.className = 'linea-item';
      div.innerHTML = `
        <span class="linea-sabor">${l.sabor}</span>
        <span class="linea-cant">${l.cantidad}</span>
        <span class="linea-unit">und</span>
        <button type="button" class="btn-del-linea" aria-label="Quitar">×</button>
      `;
      div.querySelector('.btn-del-linea').addEventListener('click', () => {
        lineas.splice(i, 1);
        renderLineas();
      });
      box.appendChild(div);
    });
  }

  function addLinea() {
    const sabor = document.getElementById('fSabor').value.trim();
    const cant  = Number(document.getElementById('fCant').value);
    if (!sabor)    { toast('Escribe el sabor', 'err'); return; }
    if (!cant || cant < 1) { toast('Escribe la cantidad', 'err'); return; }
    lineas.push({ sabor, cantidad: cant });
    renderLineas();
    document.getElementById('fSabor').value = '';
    document.getElementById('fCant').value  = '';
    document.getElementById('fSabor').focus();
  }

  document.getElementById('btnAdd').addEventListener('click', addLinea);
  ['fSabor', 'fCant'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); addLinea(); }
    })
  );

  document.getElementById('formPedido').addEventListener('submit', async function (e) {
    e.preventDefault();
    const cliente = document.getElementById('fCliente').value.trim();
    const fecha   = document.getElementById('fFecha').value;

    if (!cliente)          { toast('Escribe el nombre del cliente', 'err'); return; }
    if (lineas.length < 1) { toast('Agrega al menos un sabor', 'err'); return; }
    if (!fecha)            { toast('Elige la fecha de entrega', 'err'); return; }

    const btn = document.getElementById('btnGuardar');
    btn.disabled = true;
    btn.textContent = 'Guardando…';

    const rows = lineas.map(l => ({
      cliente,
      sabor:         l.sabor,
      cantidad:      l.cantidad,
      fecha_entrega: fecha,
      estado:        'pendiente',
    }));

    const { error } = await sb.from('pedidos').insert(rows);

    btn.disabled = false;
    btn.textContent = 'Guardar pedido';

    if (error) { toast('Error: ' + error.message, 'err'); return; }

    toast(`${rows.length} sabor${rows.length !== 1 ? 'es' : ''} guardado${rows.length !== 1 ? 's' : ''} ✓`, 'ok');
    this.reset();
    document.getElementById('fFecha').value = mananaISO();
    lineas = [];
    renderLineas();
    _loaded.pedidos = false;
    document.querySelector('[data-tab="pedidos"]').click();
  });

  /* ════════════════════════════════════════
     INVENTARIO
  ════════════════════════════════════════ */
  async function loadInventario() {
    const el = document.getElementById('inv-content');
    el.innerHTML = '<div class="loader"><div class="spinner"></div>Cargando inventario…</div>';
    _loaded.inventario = false;

    const { data, error } = await sb
      .from('inventario')
      .select('*')
      .order('sabor', { ascending: true });

    if (error) {
      el.innerHTML = `<div class="empty"><div class="ico">⚠️</div><p>Error al cargar</p><small>${error.message}</small></div>`;
      return;
    }

    _loaded.inventario = true;
    renderInventario(el, data || []);
  }

  function renderInventario(el, items) {
    if (items.length === 0) {
      el.innerHTML = `<div class="empty"><div class="ico">📦</div><p>Sin datos de inventario</p></div>`;
      return;
    }

    el.innerHTML = `<p class="sec-label">${items.length} sabores</p>`;
    const list = document.createElement('div');
    list.className = 'inv-list';

    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'inv-row';
      const upd = item.actualizado_en ? `Actualizado ${fmtFecha(item.actualizado_en)}` : '';
      row.innerHTML = `
        <div class="inv-sabor-wrap">
          <div class="inv-sabor-name">${item.sabor}</div>
          ${upd ? `<div class="inv-updated">${upd}</div>` : ''}
        </div>
        <div class="inv-right">
          <span class="inv-cant" title="Toca para editar">${item.cantidad ?? '—'}</span>
          <span class="inv-unit">und</span>
        </div>
      `;

      row.querySelector('.inv-cant').addEventListener('click', function () {
        editarInventario(item, this);
      });

      list.appendChild(row);
    });

    el.appendChild(list);
  }

  function editarInventario(item, display) {
    if (display.dataset.editing) return;
    display.dataset.editing = '1';

    const original = item.cantidad ?? 0;
    const input = document.createElement('input');
    input.type = 'number';
    input.className = 'inv-edit-input';
    input.value = original;
    input.min = 0; input.step = 1;
    display.replaceWith(input);
    input.focus(); input.select();

    async function confirm() {
      const val = Number(input.value);
      // Sin cambio
      if (isNaN(val) || val === original) {
        input.replaceWith(display);
        delete display.dataset.editing;
        return;
      }
      input.disabled = true;
      const { error } = await sb
        .from('inventario')
        .update({ cantidad: val, actualizado_en: new Date().toISOString() })
        .eq('id', item.id);

      if (error) {
        toast('Error al guardar', 'err');
        input.replaceWith(display);
        delete display.dataset.editing;
        return;
      }
      item.cantidad = val;
      display.textContent = val;
      input.replaceWith(display);
      delete display.dataset.editing;
      toast('Inventario actualizado ✓', 'ok');
      // Recargar para actualizar la fecha
      _loaded.inventario = false;
      loadInventario();
    }

    input.addEventListener('blur', confirm);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.value = original; input.blur(); }
    });
  }

  /* ── REFRESH ── */
  document.getElementById('btnRefresh').addEventListener('click', () => {
    _loaded.pedidos = false;
    _loaded.inventario = false;
    const active = document.querySelector('.tab-btn.active')?.dataset.tab;
    if (active === 'pedidos')    loadPedidos();
    if (active === 'inventario') loadInventario();
  });

  /* ── INIT ── */
  loadPedidos();
</script>
</body>
</html>
