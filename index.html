<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Bacha — Pedidos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; color: #333; }

    header { background: #1a1a2e; color: white; padding: 1.2rem 1.4rem; position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 1.5rem; }
    header p { font-size: 0.85rem; opacity: 0.7; margin-top: 0.2rem; }

    .tabs { display: flex; background: white; border-bottom: 2px solid #eee; }
    .tab { flex: 1; padding: 1.1rem; text-align: center; font-size: 1rem; cursor: pointer; color: #888; border-bottom: 3px solid transparent; font-weight: 500; }
    .tab.active { color: #1a1a2e; border-bottom-color: #1a1a2e; font-weight: 700; }

    .view { display: none; padding: 1.2rem; }
    .view.active { display: block; }

    .card { background: white; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
    .cliente { font-weight: 700; font-size: 1.3rem; }
    .badge { font-size: 0.8rem; padding: 0.35rem 0.8rem; border-radius: 2rem; font-weight: 600; }
    .badge.pendiente { background: #fff3cd; color: #856404; }
    .badge.entregado { background: #d1e7dd; color: #0a5132; }
    .sabor { font-size: 1.05rem; color: #444; margin: 0.5rem 0; }
    .fecha { font-size: 0.9rem; color: #999; }
    .btn { width: 100%; padding: 1rem; border: none; border-radius: 0.7rem; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 1rem; }
    .btn-entregar { background: #1a1a2e; color: white; }
    .btn-primary { background: #1a1a2e; color: white; padding: 1.1rem; border-radius: 0.7rem; width: 100%; border: none; font-size: 1.1rem; font-weight: 600; margin-top: 1rem; cursor: pointer; }

    .form-group { margin-bottom: 1.1rem; }
    label { font-size: 0.95rem; font-weight: 600; display: block; margin-bottom: 0.4rem; color: #444; }
    input, select { width: 100%; padding: 0.9rem; border: 1.5px solid #ddd; border-radius: 0.7rem; font-size: 1rem; background: white; }

    .prod-cant { font-weight: 700; color: #dc3545; font-size: 1.1rem; margin-top: 0.5rem; }

    .empty { text-align: center; color: #aaa; padding: 3rem 1rem; font-size: 1rem; }
    .loading { text-align: center; padding: 3rem; color: #aaa; font-size: 1rem; }
    .spinner { display: inline-block; width: 1.5rem; height: 1.5rem; border: 3px solid #ddd; border-top-color: #1a1a2e; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 0.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>🍦 La Bacha</h1>
  <p>Gestión de Pedidos</p>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('pedidos')">Pedidos</div>
  <div class="tab" onclick="showTab('nuevo')">+ Nuevo</div>
  <div class="tab" onclick="showTab('produccion')">Producción</div>
</div>

<div id="pedidos" class="view active">
  <div id="lista-pedidos" class="loading"><div class="spinner"></div><br>Cargando...</div>
</div>

<div id="nuevo" class="view">
  <div class="card">
    <div class="form-group">
      <label>Cliente</label>
      <input type="text" id="cliente" placeholder="Nombre del restaurante">
    </div>
    <div class="form-group">
      <label>Sabor</label>
      <select id="sabor">
        <option value="">Seleccionar sabor...</option>
      </select>
    </div>
    <div class="form-group">
      <label>Cantidad (bachas)</label>
      <input type="number" id="cantidad" min="1" placeholder="Ej: 3">
    </div>
    <div class="form-group">
      <label>Fecha de entrega</label>
      <input type="date" id="fechaEntrega">
    </div>
    <button class="btn-primary" onclick="agregarPedido()">Guardar pedido</button>
  </div>
</div>

<div id="produccion" class="view">
  <div id="lista-produccion" class="loading"><div class="spinner"></div><br>Cargando...</div>
</div>

<script>
  const API = "https://script.google.com/a/macros/labacha.cl/s/AKfycbywhhPjdosfbsoUPNtl5wO08SCPyv-Xktdf1UFEjtAbD8xR2NtSwwZYXPOKuxU59Vw/exec";

  let pedidos = [];
  let inventario = [];

  function showTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['pedidos','nuevo','produccion'][i] === tab);
    });
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    if (tab === 'produccion') renderProduccion();
  }

  async function cargarDatos() {
    try {
      const [resPedidos, resInventario] = await Promise.all([
        fetch(`${API}?action=getPedidos`),
        fetch(`${API}?action=getInventario`)
      ]);
      pedidos = await resPedidos.json();
      inventario = await resInventario.json();
      renderPedidos();
      poblarSabores();
    } catch(e) {
      document.getElementById('lista-pedidos').innerHTML = '<div class="empty">Error al cargar datos</div>';
    }
  }

  function poblarSabores() {
    const select = document.getElementById('sabor');
    select.innerHTML = '<option value="">Seleccionar sabor...</option>';
    inventario.forEach(item => {
      const opt = document.createElement('option');
      opt.value = item.sabor;
      opt.textContent = item.sabor;
      select.appendChild(opt);
    });
  }

  function renderPedidos() {
    const lista = document.getElementById('lista-pedidos');
    const pendientes = pedidos.filter(p => p.estado === 'Pendiente');
    if (pendientes.length === 0) {
      lista.innerHTML = '<div class="empty">No hay pedidos pendientes 🎉</div>';
      return;
    }
    lista.innerHTML = pendientes.map(p => `
      <div class="card">
        <div class="card-header">
          <span class="cliente">${p.cliente}</span>
          <span class="badge pendiente">Pendiente</span>
        </div>
        <div class="sabor">🍦 ${p.cantidad} bacha(s) de ${p.sabor}</div>
        <div class="fecha">📅 Entrega: ${p.fechaEntrega}</div>
        <button class="btn btn-entregar" onclick="entregar('${p.id}')">✓ Marcar como entregado</button>
      </div>
    `).join('');
  }

  function renderProduccion() {
    const lista = document.getElementById('lista-produccion');
    const pendientes = pedidos.filter(p => p.estado === 'Pendiente');
    const necesario = {};
    pendientes.forEach(p => {
      necesario[p.sabor] = (necesario[p.sabor] || 0) + Number(p.cantidad);
    });
    const inv = {};
    inventario.forEach(i => inv[i.sabor] = Number(i.cantidad));

    const falta = Object.entries(necesario).map(([sabor, pedido]) => ({
      sabor, pedido,
      disponible: inv[sabor] || 0,
      producir: Math.max(0, pedido - (inv[sabor] || 0))
    })).filter(i => i.producir > 0);

    if (falta.length === 0) {
      lista.innerHTML = '<div class="empty">✅ Todo cubierto con el inventario actual</div>';
      return;
    }
    lista.innerHTML = falta.map(i => `
      <div class="card">
        <div class="card-header">
          <span class="cliente">${i.sabor}</span>
        </div>
        <div class="sabor">Pedido: ${i.pedido} | Disponible: ${i.disponible}</div>
        <div class="prod-cant">Producir: ${i.producir} bacha(s)</div>
      </div>
    `).join('');
  }

  async function agregarPedido() {
    const cliente = document.getElementById('cliente').value.trim();
    const sabor = document.getElementById('sabor').value;
    const cantidad = document.getElementById('cantidad').value;
    const fechaEntrega = document.getElementById('fechaEntrega').value;

    if (!cliente || !sabor || !cantidad || !fechaEntrega) {
      alert('Por favor completa todos los campos');
      return;
    }

    try {
      const res = await fetch(`${API}?action=agregarPedido&cliente=${encodeURIComponent(cliente)}&sabor=${encodeURIComponent(sabor)}&cantidad=${cantidad}&fechaEntrega=${fechaEntrega}`);
      const data = await res.json();
      if (data.success) {
        alert('Pedido guardado ✓');
        document.getElementById('cliente').value = '';
        document.getElementById('cantidad').value = '';
        await cargarDatos();
        showTab('pedidos');
      }
    } catch(e) {
      alert('Error al guardar el pedido');
    }
  }

  async function entregar(id) {
    if (!confirm('¿Marcar este pedido como entregado?')) return;
    try {
      const res = await fetch(`${API}?action=entregarPedido&id=${id}`);
      const data = await res.json();
      if (data.success) await cargarDatos();
    } catch(e) {
      alert('Error al actualizar el pedido');
    }
  }

  cargarDatos();
</script>
</body>
</html>
